<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salão de Beleza - Login</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/autenticacao.css">
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="../../index.html">Início</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="profissionais.html">Profissionais</a></li>
                <li><a href="pacotes.html">Pacotes</a></li>
                <li><a href="reservar.html">Reservar</a></li>
                <li><a id="link-login" href="login.html" class="ativo">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="sessao-autenticacao">
        
        <section class="sessao-autenticacao tela-login">
            
            <div class="cabecalho-form">
                <h2>Acesse sua Conta</h2>
                <img src="../assets/imagens/icone-logo-clinica.png" alt="Ícone da logo do salão de beleza">
            </div>

            <div class="caixa-formulario">
                <form id="form-login" action="#" method="POST">
                    
                    <div class="linha-input">
                        <img src="../assets/imagens/icone-usuario.png" class="icone-campo" alt="Ícone Usuário">
                        <div class="grupo-campo">
                            <label for="login_usuario">Usuário ou E-mail</label>
                            <input type="text" id="login_usuario" name="login_usuario" placeholder="Digite seu usuário ou e-mail" required>
                        </div>
                    </div>

                    <div class="linha-input">
                        <img src="../assets/imagens/icone-cadeado.png" class="icone-campo" alt="Ícone Cadeado">
                        <div class="grupo-campo">
                            <label for="senha">Senha</label>
                            
                            <div class="container-senha">
                                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                                <button type="button" id="btn-olho" class="btn-mostrar-senha">Mostrar</button>
                            </div>
                            
                        </div>
                    </div>

                    <div class="acoes-form">
                        <button type="submit" class="btn btn-form">Fazer Login</button>
                        <a href="cadastro.html" class="link-secundario">Não tem conta? Cadastre-se</a>
                    </div>

                </form>
            </div>

        </section>
    </main>

    <script src="../js/global.js"></script>
    <script src="../js/login.js"></script>

    </body>
</html>
