<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Calculadora usando JS! </title>

    <script>
        // Função que recebe qual operação o usuário clicou
        function Calcular(operacao) {

            let a = document.getElementById("a").value;
            let b = document.getElementById("b").value;
            
            console.log("Valores capturados: a=" + a + " b=" + b + " operacao=" + operacao);

            // xmlttp vai levar os dados até o PHP e trazer a resposta sem recarregar a página.
            let xmlhttp = new XMLHttpRequest();
            
            // Quando a resposta PHP chegar -> fazer isso (sem regarrecar a página)
            xmlhttp.onreadystatechange = function() {
                // readyState == 4 significa "A resposta chegou"
                // status == 200 significa "Deu tudo certo (código HTTP 200 OK)"
                if (this.readyState == 4 && this.status == 200) {
                    
                    console.log("Retorno do PHP: " + this.responseText);
                    
                    document.getElementById("msg").innerHTML = "Resultado: " + this.responseText;
                    
                } else if (this.readyState < 4) {
                    console.log("Carregando... Status atual: " + this.readyState);
                } else {
                    console.log("Erro! Código: " + this.status);
                }
            }
            
            let url = "http://localhost/3daw/Atividade%204%20-%20Calculadora%20JS/calculadora.php?a=" + a + "&b=" + b + "&operacao=" + operacao;
            
            xmlhttp.open("GET", url);
            xmlhttp.send();
            console.log("O JS despachou a requisição para o PHP invisivelmente.");
        }
    </script>
</head>
<body>
    <h1> Minha Calculadora usando JS! </h1>

    <form name="formCalc" id="formCalc">
        a: <input type="text" name="a" id="a"><br>
        b: <input type="text" name="b" id="b"><br><br>

        <input type="button" value="Somar (a+b)" onclick="Calcular('soma');">
        <input type="button" value="Subtrair (a-b)" onclick="Calcular('subtracao');"><br><br>
        <input type="button" value="Multiplicar (a×b)" onclick="Calcular('multiplicacao');">
        <input type="button" value="Dividir (a÷b)" onclick="Calcular('divisao');"><br><br>
        <input type="button" value="Potência (aᵇ)" onclick="Calcular('potenciacao');">
        <input type="button" value="Raiz (b√a)" onclick="Calcular('radiciacao');">
    </form>

    <br><br>
    
    <!-- O JS preenche esse msg-->
    <p id="msg"></p>
    
</body>
</html>
