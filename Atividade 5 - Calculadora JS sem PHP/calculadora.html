<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora JS</title>
    <script src="calculadora.js"></script>
</head>
<body>
    <h1> Minha Calculadora! </h1>

    <form name="formCalc" id="formCalc">
        a: <input type="text" name="a" id="a"><br>
        b: <input type="text" name="b" id="b"><br><br>

        <input type="button" id="soma" value="Somar (a+b)">
        <input type="button" id="subtracao" value="Subtrair (a-b)"><br><br>
        <input type="button" id="multiplicacao" value="Multiplicar (a×b)">
        <input type="button" id="divisao" value="Dividir (a÷b)"><br><br>
        <input type="button" id="potenciacao" value="Potência (aᵇ)">
        <input type="button" id="radiciacao" value="Raiz (b√a)">
    </form>

    <br><br>
    <p id="msg"></p>
</body>
</html>
